<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Header: next preview + stats + pause -->
  <div id="header">
    <div id="next-area">
      <div class="hlabel">NEXT</div>
      <canvas id="next-canvas"></canvas>
    </div>
    <div id="stats">
      <div class="stat"><span class="hlabel">SCORE</span><span id="score">0</span></div>
      <div class="stat"><span class="hlabel">LEVEL</span><span id="level">1</span></div>
      <div class="stat"><span class="hlabel">LINES</span><span id="lines">0</span></div>
    </div>
    <button class="icon-btn" id="pause-btn" aria-label="Pause">⏸</button>
  </div>

  <!-- Game canvas -->
  <div id="canvas-area">
    <canvas id="game-canvas"></canvas>
  </div>

  <!-- Touch controls -->
  <div id="controls">
    <div id="ctrl-row1">
      <button class="ctrl-btn" id="btn-left"  aria-label="Left">◀</button>
      <button class="ctrl-btn" id="btn-down"  aria-label="Soft drop">▼</button>
      <button class="ctrl-btn" id="btn-right" aria-label="Right">▶</button>
      <button class="ctrl-btn" id="btn-ccw"   aria-label="Rotate CCW">↺</button>
      <button class="ctrl-btn" id="btn-cw"    aria-label="Rotate CW">↻</button>
    </div>
    <div id="ctrl-row2">
      <button class="ctrl-btn wide" id="btn-hard" aria-label="Hard drop">HARD DROP</button>
    </div>
  </div>

  <!-- Pause / Game Over overlay -->
  <div id="overlay" class="hidden">
    <div id="overlay-content">
      <div id="overlay-title"></div>
      <div id="overlay-score"></div>
      <div id="overlay-hint"></div>
      <button id="overlay-btn"></button>
    </div>
  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
